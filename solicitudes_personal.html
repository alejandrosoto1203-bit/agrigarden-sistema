<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes del Personal - Agrigarden</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="api.js?v=5"></script>
    <script src="auth.js"></script>
    <script src="menu.js"></script>
    <script src="permisos.js"></script>
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        .tab-active {
            border-bottom: 3px solid #19e66b;
            color: #111;
            font-weight: 900;
        }

        .badge-pendiente {
            background: #fef9c3;
            color: #ca8a04;
        }

        .badge-aprobada {
            background: #dcfce7;
            color: #16a34a;
        }

        .badge-negada {
            background: #fee2e2;
            color: #dc2626;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">
    <div class="flex h-screen overflow-hidden">
        <div id="sidebar-container"></div>
        <main class="flex-1 overflow-y-auto">
            <div class="p-6 lg:p-8 max-w-4xl mx-auto">

                <!-- Header -->
                <div class="mb-8 flex items-center gap-3">
                    <div class="size-12 bg-black rounded-xl flex items-center justify-center">
                        <span class="material-symbols-outlined text-white text-xl">assignment</span>
                    </div>
                    <div>
                        <h1 class="text-2xl font-black text-gray-900">Solicitudes del Personal</h1>
                        <p class="text-sm text-gray-500">Revisa y responde las solicitudes de tus empleados</p>
                    </div>
                </div>

                <!-- KPIs -->
                <div class="grid grid-cols-3 gap-4 mb-6">
                    <div class="bg-yellow-50 border border-yellow-200 rounded-2xl p-4">
                        <p class="text-xs font-bold text-yellow-600 uppercase mb-1">Pendientes</p>
                        <p id="kpiPendientes" class="text-3xl font-black text-yellow-700">—</p>
                    </div>
                    <div class="bg-green-50 border border-green-200 rounded-2xl p-4">
                        <p class="text-xs font-bold text-green-600 uppercase mb-1">Aprobadas (mes)</p>
                        <p id="kpiAprobadas" class="text-3xl font-black text-green-700">—</p>
                    </div>
                    <div class="bg-red-50 border border-red-200 rounded-2xl p-4">
                        <p class="text-xs font-bold text-red-600 uppercase mb-1">Negadas (mes)</p>
                        <p id="kpiNegadas" class="text-3xl font-black text-red-700">—</p>
                    </div>
                </div>

                <!-- Filtros -->
                <div class="bg-white rounded-2xl border border-gray-200 shadow-sm mb-6">
                    <div class="flex border-b border-gray-100 px-6 gap-6">
                        <button onclick="cambiarTab('pendiente')" id="tab-pendiente" data-tab
                            class="py-4 text-sm font-bold text-gray-400 tab-active">⏳ Pendientes</button>
                        <button onclick="cambiarTab('todas')" id="tab-todas" data-tab
                            class="py-4 text-sm font-bold text-gray-400">Todas</button>
                        <button onclick="cambiarTab('aprobada')" id="tab-aprobada" data-tab
                            class="py-4 text-sm font-bold text-gray-400">✅ Aprobadas</button>
                        <button onclick="cambiarTab('negada')" id="tab-negada" data-tab
                            class="py-4 text-sm font-bold text-gray-400">❌ Negadas</button>
                    </div>

                    <!-- Filtro por empleado -->
                    <div class="px-6 py-3 border-b border-gray-50 flex items-center gap-3">
                        <span class="material-symbols-outlined text-gray-300 text-sm">filter_list</span>
                        <select id="filtroEmpleado" onchange="aplicarFiltros()"
                            class="text-xs font-bold border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none">
                            <option value="">Todos los empleados</option>
                        </select>
                        <select id="filtroTipo" onchange="aplicarFiltros()"
                            class="text-xs font-bold border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none">
                            <option value="">Todos los tipos</option>
                            <option value="vacaciones">Vacaciones</option>
                            <option value="permiso_sin_goce">Permiso sin Goce</option>
                            <option value="pase_salida">Pase de Salida</option>
                            <option value="permiso_horas">Permiso por Horas</option>
                        </select>
                    </div>

                    <div id="listaSolicitudes" class="divide-y divide-gray-50 p-6">
                        <p class="text-sm text-gray-400 text-center py-8">Cargando solicitudes...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de Respuesta -->
    <div id="modalRespuesta" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4"
        style="backdrop-filter:blur(4px)">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md">
            <div class="p-6 border-b border-gray-100 flex items-center justify-between">
                <h2 id="tituloModal" class="text-lg font-black text-gray-900">Responder Solicitud</h2>
                <button onclick="cerrarModal()" class="text-gray-400 hover:text-gray-600">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-6 space-y-5">
                <!-- Detalle solicitud -->
                <div id="detalleSolicitud" class="bg-gray-50 rounded-xl p-4 text-sm text-gray-600"></div>

                <!-- Comentario -->
                <div>
                    <label class="block text-xs font-black text-gray-500 uppercase mb-2">Comentario para el
                        empleado</label>
                    <textarea id="comentarioAdmin" rows="3" placeholder="Escribe una respuesta o justificación..."
                        class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-black resize-none"></textarea>
                </div>

                <!-- Botones de acción -->
                <div class="flex gap-3">
                    <button onclick="responderSolicitud('negada')"
                        class="flex-1 py-3 border-2 border-red-200 text-red-600 text-sm font-black rounded-xl hover:bg-red-50 transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-sm">cancel</span> Negar
                    </button>
                    <button onclick="responderSolicitud('aprobada')"
                        class="flex-1 py-3 bg-black text-white text-sm font-black rounded-xl hover:bg-gray-800 transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-sm">check_circle</span> Aprobar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _SB_URL = 'https://gajhfqfuvzotppnmzbuc.supabase.co';
        const _SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhamhmcWZ1dnpvdHBwbm16YnVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg0MjM5OTAsImV4cCI6MjA4Mzk5OTk5MH0.FLomja07LVEmtzSuhBKRDQVcOXqryimaYPDBdIVNVbQ';
        let sb;
        if (window.supabase?.createClient) sb = window.supabase.createClient(_SB_URL, _SB_KEY);

        const usuario = JSON.parse(sessionStorage.getItem('usuario') || '{}');
        let todasLasSolicitudes = [];
        let solicitudActual = null;
        let tabActual = 'pendiente';
        let empleadosMap = {};

        document.addEventListener('DOMContentLoaded', async () => {
            inyectarMenu('solicitudes_personal');
            await cargarEmpleados();
            await cargarSolicitudes();
        });

        async function cargarEmpleados() {
            const { data } = await sb.from('empleados').select('id, nombre_completo').eq('estatus', 'Activo').order('nombre_completo');
            const select = document.getElementById('filtroEmpleado');
            (data || []).forEach(e => {
                empleadosMap[e.id] = e.nombre_completo;
                select.innerHTML += `<option value="${e.id}">${e.nombre_completo}</option>`;
            });
        }

        async function cargarSolicitudes() {
            const { data } = await sb
                .from('solicitudes_empleado')
                .select('*, empleados(nombre_completo)')
                .order('created_at', { ascending: false });
            todasLasSolicitudes = data || [];

            // KPIs
            const ahora = new Date();
            const mesActual = ahora.getMonth(), anioActual = ahora.getFullYear();
            const delMes = todasLasSolicitudes.filter(s => {
                const d = new Date(s.created_at);
                return d.getMonth() === mesActual && d.getFullYear() === anioActual;
            });
            document.getElementById('kpiPendientes').textContent = todasLasSolicitudes.filter(s => s.estado === 'pendiente').length;
            document.getElementById('kpiAprobadas').textContent = delMes.filter(s => s.estado === 'aprobada').length;
            document.getElementById('kpiNegadas').textContent = delMes.filter(s => s.estado === 'negada').length;

            // Badge en menú
            const pendientes = todasLasSolicitudes.filter(s => s.estado === 'pendiente').length;
            if (window.updateMenuBadges) updateMenuBadges({ solicitudes_personal: pendientes });

            aplicarFiltros();
        }

        function cambiarTab(tab) {
            tabActual = tab;
            document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`tab-${tab}`).classList.add('tab-active');
            aplicarFiltros();
        }

        function aplicarFiltros() {
            const empFiltro = document.getElementById('filtroEmpleado').value;
            const tipoFiltro = document.getElementById('filtroTipo').value;
            let lista = todasLasSolicitudes;
            if (tabActual !== 'todas') lista = lista.filter(s => s.estado === tabActual);
            if (empFiltro) lista = lista.filter(s => s.empleado_id === empFiltro);
            if (tipoFiltro) lista = lista.filter(s => s.tipo === tipoFiltro);
            renderSolicitudes(lista);
        }

        const tipoLabel = { vacaciones: '🏖️ Vacaciones', permiso_sin_goce: '📅 Permiso sin Goce', pase_salida: '🚪 Pase de Salida', permiso_horas: '⏰ Permiso por Horas' };
        const iconoColor = { vacaciones: 'text-amber-500', permiso_sin_goce: 'text-gray-500', pase_salida: 'text-blue-500', permiso_horas: 'text-purple-500' };

        function renderSolicitudes(lista) {
            const container = document.getElementById('listaSolicitudes');
            if (!lista.length) {
                container.innerHTML = '<p class="text-sm text-gray-400 text-center py-8">No hay solicitudes en esta sección</p>';
                return;
            }
            container.innerHTML = lista.map(s => `
            <div class="py-5 flex items-start justify-between gap-4">
                <div class="flex-1 min-w-0">
                    <div class="flex flex-wrap items-center gap-2 mb-2">
                        <span class="badge-${s.estado} text-[10px] font-black px-2 py-0.5 rounded-full">${s.estado.toUpperCase()}</span>
                        <span class="text-sm font-black text-gray-800">${tipoLabel[s.tipo] || s.tipo}</span>
                        <span class="text-xs text-gray-400">·</span>
                        <span class="text-xs font-bold text-gray-600">${s.empleados?.nombre_completo || '—'}</span>
                    </div>
                    ${s.fecha_inicio ? `<p class="text-xs text-gray-500 mb-1">📅 ${s.fecha_inicio}${s.fecha_fin && s.fecha_fin !== s.fecha_inicio ? ' → ' + s.fecha_fin : ''} · <strong>${s.dias_solicitados || 1} día(s)</strong></p>` : ''}
                    ${s.hora_salida ? `<p class="text-xs text-gray-500 mb-1">🕐 Salida: ${s.hora_salida}${s.hora_regreso ? ' — Regreso: ' + s.hora_regreso : ''}</p>` : ''}
                    ${s.descripcion ? `<p class="text-xs text-gray-400 italic">"${s.descripcion}"</p>` : ''}
                    ${s.comentario_admin ? `<p class="text-xs font-bold text-gray-500 mt-1">💬 "${s.comentario_admin}"</p>` : ''}
                </div>
                <div class="flex flex-col items-end gap-2 shrink-0">
                    <p class="text-[10px] text-gray-400">${new Date(s.created_at).toLocaleDateString('es-MX')}</p>
                    ${s.estado === 'pendiente' ? `
                    <button onclick='abrirModal(${JSON.stringify(s)})'
                        class="text-xs font-black px-3 py-1.5 bg-black text-white rounded-lg hover:bg-gray-800 transition-all">
                        Responder
                    </button>` : ''}
                </div>
            </div>`).join('');
        }

        function abrirModal(solicitud) {
            solicitudActual = solicitud;
            const nombreEmp = solicitud.empleados?.nombre_completo || empleadosMap[solicitud.empleado_id] || '—';
            document.getElementById('tituloModal').textContent = `Solicitud de ${nombreEmp}`;
            document.getElementById('detalleSolicitud').innerHTML = `
            <p class="font-black text-gray-800 mb-2">${tipoLabel[solicitud.tipo] || solicitud.tipo}</p>
            ${solicitud.fecha_inicio ? `<p>📅 ${solicitud.fecha_inicio}${solicitud.fecha_fin && solicitud.fecha_fin !== solicitud.fecha_inicio ? ' → ' + solicitud.fecha_fin : ''} · ${solicitud.dias_solicitados || 1} día(s)</p>` : ''}
            ${solicitud.hora_salida ? `<p>🕐 Salida: ${solicitud.hora_salida}${solicitud.hora_regreso ? ' — Regreso: ' + solicitud.hora_regreso : ''}</p>` : ''}
            ${solicitud.descripcion ? `<p class="italic text-gray-500 mt-1">"${solicitud.descripcion}"</p>` : ''}
        `;
            document.getElementById('comentarioAdmin').value = '';
            document.getElementById('modalRespuesta').classList.remove('hidden');
        }

        function cerrarModal() {
            document.getElementById('modalRespuesta').classList.add('hidden');
            solicitudActual = null;
        }

        async function responderSolicitud(decision) {
            if (!solicitudActual) return;
            const comentario = document.getElementById('comentarioAdmin').value.trim();

            const { error } = await sb.from('solicitudes_empleado').update({
                estado: decision,
                comentario_admin: comentario || null,
                respondido_at: new Date().toISOString(),
                respondido_por: usuario.id,
                leido_por_empleado: false
            }).eq('id', solicitudActual.id);

            if (error) { alert('Error: ' + error.message); return; }

            cerrarModal();
            await cargarSolicitudes();
        }
    </script>
</body>

</html>
