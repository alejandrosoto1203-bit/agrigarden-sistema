<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Órdenes Terminadas - Agrigarden</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "var(--theme-color)", background: "#f8fafc" },
                    fontFamily: { sans: ["Manrope", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Manrope', sans-serif;
        }

        .input-form {
            background: #f1f5f9;
            border: 1.5px solid #e5e7eb;
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            font-weight: 600;
            width: 100%;
            font-size: 0.9rem;
        }

        .label-form {
            text-transform: uppercase;
            font-size: 0.7rem;
            font-weight: 800;
            color: #6b7280;
            margin-left: 0.5rem;
            margin-bottom: 0.3rem;
            display: block;
        }

        .estatus-badge {
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>

<body class="min-h-screen text-[#1e293b] flex">
    <div id="sidebar-container"></div>

    <main class="pt-20 lg:pt-0 flex-1 p-4 lg:p-10 space-y-8 min-w-0">
        <!-- HEADER -->
        <header>
            <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 italic uppercase">Órdenes Terminadas</h1>
            <p class="text-slate-500 font-medium text-lg mt-1">Órdenes listas para cobro y entrega.</p>
        </header>

        <!-- FILTROS -->
        <div class="flex gap-2">
            <select id="filtroEstatus" onchange="cargarOrdenesTerminadas()" class="input-form text-xs w-44">
                <option value="">En Proceso + Terminadas</option>
                <option value="EN_PROCESO">En Proceso</option>
                <option value="TERMINADA">Terminadas</option>
                <option value="ENTREGADA">Entregadas</option>
            </select>
        </div>

        <!-- LISTA -->
        <div id="listaTerminadas" class="space-y-4">
            <p class="text-slate-300 italic text-sm text-center py-12">Cargando...</p>
        </div>

        <!-- DETALLE (oculto) -->
        <div id="detalleTerminada" class="hidden space-y-6">
            <button onclick="volverListaTerminadas()"
                class="text-sm font-bold text-slate-400 hover:text-slate-600 flex items-center gap-1">
                <span class="material-symbols-outlined text-sm">arrow_back</span> Volver
            </button>

            <!-- Info -->
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <div class="flex flex-col lg:flex-row justify-between items-start gap-4">
                    <div>
                        <p class="text-xs font-black uppercase text-slate-400 tracking-widest mb-2">Orden de Reparación
                        </p>
                        <h2 class="text-3xl font-black text-primary" id="detTFolio"></h2>
                        <p class="text-sm text-slate-500 mt-1"><span class="font-bold" id="detTCliente"></span></p>
                        <p class="text-xs text-slate-400 mt-1" id="detTEquipo"></p>
                        <p class="text-xs text-slate-400" id="detTMecanico"></p>
                    </div>
                    <div class="text-right">
                        <span id="detTEstatus" class="estatus-badge"></span>
                        <p class="text-xs text-slate-400 mt-2" id="detTFechas"></p>
                    </div>
                </div>
                <div class="mt-4 bg-slate-50 rounded-xl p-4" id="detTObsContainer">
                    <p class="text-[10px] font-black uppercase text-slate-400 mb-1">Observaciones / Notas</p>
                    <p class="text-sm text-slate-600" id="detTObs"></p>
                </div>
            </div>

            <!-- Items -->
            <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                <p class="text-xs font-black uppercase text-slate-400 tracking-widest mb-4">Piezas / Refacciones</p>
                <table class="w-full text-sm">
                    <thead class="bg-slate-50/80 border-b border-slate-100">
                        <tr class="text-[10px] font-black uppercase text-slate-400 tracking-widest">
                            <th class="px-3 py-3 text-center">Cant.</th>
                            <th class="px-3 py-3 text-left">SKU</th>
                            <th class="px-3 py-3 text-left">Descripción</th>
                            <th class="px-3 py-3 text-right">Precio c/IVA</th>
                        </tr>
                    </thead>
                    <tbody id="bodyItemsTerminada"></tbody>
                    <tfoot>
                        <tr class="border-t-2 border-slate-200">
                            <td colspan="3" class="px-3 py-4 text-right font-black text-sm uppercase text-slate-500">
                                Total</td>
                            <td class="px-3 py-4 text-right font-black text-xl text-primary" id="totalTerminada">$0.00
                            </td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <!-- Acciones -->
            <div class="flex flex-col lg:flex-row gap-4" id="accionesTerminada">
                <!-- Se llena dinámicamente -->
            </div>
        </div>
    </main>

    <script src="api.js?v=4"></script>
    <script src="auth.js"></script>
    <script src="menu.js?v=4"></script>
    <script src="ordenes_terminadas.js?v=1"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            inyectarMenu('ordenes_terminadas');
            inicializarTerminadas();
        });
    </script>
</body>

</html>
